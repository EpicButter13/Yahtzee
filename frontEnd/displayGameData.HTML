<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahtzee Dashboard</title>

    <link rel="stylesheet" href="displayStyle.css">

    <!-- Particle API MUST load before your JS -->
    <script src="https://unpkg.com/particle-api-js/dist/particle.min.js"></script>
</head>

<body>

<div id = "allContent">

    <h1>YAHTZEE!</h1>


    <div id = "scoreTableAndMuteButton">
        <table id="scoreTable" border="1" cellpadding="10" cellspacing="0">
            <thead>
                <tr>
                    <th>Hand</th>
                    <th>Score If Played</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Ones</td><td id="ones_score">--</td></tr>
                <tr><td>Twos</td><td id="twos_score">--</td></tr>
                <tr><td>Threes</td><td id="threes_score">--</td></tr>
                <tr><td>Fours</td><td id="fours_score">--</td></tr>
                <tr><td>Fives</td><td id="fives_score">--</td></tr>
                <tr><td>Sixes</td><td id="sixes_score">--</td></tr>
                <tr><td>Three of a Kind</td><td id="three_kind_score">--</td></tr>
                <tr><td>Four of a Kind</td><td id="four_kind_score">--</td></tr>
                <tr><td>Full House</td><td id="full_house_score">--</td></tr>
                <tr><td>Small Straight</td><td id="small_straight_score">--</td></tr>
                <tr><td>Large Straight</td><td id="large_straight_score">--</td></tr>
                <tr><td>Yahtzee</td><td id="yahtzee_score">--</td></tr>
                <tr><td>Chance</td><td id="chance_score">--</td></tr>
            </tbody>
        </table>


        <audio id="Sky_High" src="gameSoundTrack.mp3" preload="auto" loop></audio>
        <button id = "muteControlSoundtrackButton" onclick = "toggleMusic()">MUTE/UNMUTE Elektronomia - Sky High</button>
    </div>


    <br><br>
    <!-- Implement buttons for the player to select which dice to reroll -->
    <h2>SELECT WHICH DICE TO LOCK IN (NO REROLL):</h2>
    <div id = "diceSelectorPanel" role="group" aria-label="Dice controls">
        <button id = "dice1" class = "btn-grow" onclick = "rollThis(this, 1)"></button>
        <button id = "dice2" class = "btn-grow" onclick = "rollThis(this, 2)"></button>
        <button id = "dice3" class = "btn-grow" onclick = "rollThis(this, 3)"></button>
        <button id = "dice4" class = "btn-grow" onclick = "rollThis(this, 4)"></button>
        <button id = "dice5" class = "btn-grow" onclick = "rollThis(this, 5)"></button>
    </div>

    <!-- RULES (properly commented so it CANNOT break JS) -->
    <!--
    <h2>RULES</h2>
    <img src="combinations.png" alt="Yahtzee combinations" width="500">
    -->

</div>

<!-- Your JS file -->
<script src="webPageScript.js"></script>

</body>
</html>
